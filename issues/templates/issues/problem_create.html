{% extends 'issues/base.html' %}
{% load i18n %}
{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">{% trans "Создать заявку" %}</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label for="title" class="form-label">{% trans "Название" %}</label>
            <input type="text" class="form-control" id="title" name="title" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">{% trans "Описание" %}</label>
            <textarea class="form-control" id="description" name="description" required rows="5"></textarea>
        </div>

        <div class="mb-3">
    <label class="form-label">{% trans "Категория проблемы" %} <span class="text-danger">*</span></label>
    {{ form.category }}
    {% if form.category.errors %}
        <div class="text-danger small">{{ form.category.errors }}</div>
    {% endif %}
        </div>

        <div class="mb-3">
            <label for="image" class="form-label">{% trans "Изображение (опционально)" %}</label>
            <input type="file" class="form-control" id="image" name="image">
        </div>

        <!-- Блок с кнопками — теперь они рядом -->
        <div class="d-flex gap-3 mt-4">
            <button type="submit" class="btn btn-primary">
                Создать
            </button>

            {% trans "Изменения будут потеряны. Вернуться к списку?" as confirm_msg %}
            <button type="button" class="btn btn-outline-danger"
                    onclick="if(confirm('{{ confirm_msg|escapejs }}')) history.back();">
                {% trans "Назад к списку" %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
